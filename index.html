<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>测测你最近最适合去哪个城市旅游</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style id="fb-font" disabled>
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif!important}
  .home-title,.question-text,.result-city-name{font-family:"STKaiti","KaiTi",serif!important}
</style>
<style>
:root{
  --cream:#FDF4E3;--beige:#E8D9C6;--rose:#D4A5A5;--rose-dark:#B88080;
  --warm-orange:#E6B8A2;--text-dark:#3A2E2A;--text-mid:#6B5344;
  --text-light:#9C8070;--card-bg:rgba(255,255,255,0.72);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans SC',"PingFang SC","Microsoft YaHei",sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* HOME */
#home{align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;background:radial-gradient(ellipse at 60% 20%,#F5E6CE 0%,#FDF4E3 60%)}
.home-deco{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
.deco-circle{position:absolute;border-radius:50%;opacity:.18}
.deco-circle.a{width:300px;height:300px;background:var(--rose);top:-80px;right:-60px}
.deco-circle.b{width:180px;height:180px;background:#C8B8A2;bottom:60px;left:-50px}
.deco-circle.c{width:80px;height:80px;background:var(--warm-orange);bottom:200px;right:40px}
.home-icon{font-size:72px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.home-tag{display:inline-block;background:var(--rose);color:#fff;font-size:12px;padding:4px 14px;border-radius:20px;margin-bottom:18px;letter-spacing:1px}
.home-title{font-family:'Ma Shan Zheng',"STKaiti","KaiTi",serif;font-size:clamp(26px,6vw,40px);color:var(--text-dark);line-height:1.3;margin-bottom:12px}
.home-sub{font-size:15px;color:var(--text-mid);line-height:1.7;max-width:340px;margin:0 auto 32px}
.home-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:36px}
.pill{background:rgba(212,165,165,.15);border:1px solid rgba(212,165,165,.4);color:var(--text-mid);font-size:13px;padding:6px 14px;border-radius:20px}
.btn-start{background:var(--rose);color:#fff;border:none;padding:16px 48px;border-radius:48px;font-size:17px;font-family:inherit;cursor:pointer;transition:transform .15s,background .15s;box-shadow:0 6px 24px rgba(212,165,165,.4)}
.btn-start:hover{background:var(--rose-dark);transform:translateY(-2px)}
.btn-start:active{transform:scale(.97)}
.home-note{margin-top:20px;font-size:13px;color:var(--text-light)}

/* QUIZ */
#quiz{background:var(--cream)}
.quiz-top{padding:20px 24px 12px;position:sticky;top:0;background:var(--cream);z-index:10;border-bottom:1px solid rgba(232,217,198,.6)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text-light)}
.progress-track{width:100%;height:4px;background:var(--beige);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--rose);border-radius:4px;transition:width .4s ease}
.quiz-body{flex:1;padding:24px 24px 100px;max-width:600px;margin:0 auto;width:100%}
.question-num{font-size:13px;color:var(--text-light);margin-bottom:8px;letter-spacing:.5px}
.question-text{font-family:'Noto Serif SC',"STSong","SimSun",serif;font-size:clamp(18px,4.5vw,24px);color:var(--text-dark);line-height:1.5;margin-bottom:28px;min-height:60px}
.options{display:flex;flex-direction:column;gap:12px}
.option-btn{background:var(--card-bg);border:1.5px solid rgba(212,165,165,.25);border-radius:16px;padding:16px 20px;font-size:15px;color:var(--text-dark);font-family:inherit;cursor:pointer;text-align:left;transition:all .18s;min-height:56px}
@media(hover:hover){.option-btn:hover{border-color:var(--rose);background:rgba(212,165,165,.12);transform:translateY(-1px)}}
.option-btn.selected{border-color:var(--rose);background:rgba(212,165,165,.18);box-shadow:0 0 0 3px rgba(212,165,165,.12)}
.option-btn:active{transform:scale(.98)}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;position:fixed;bottom:0;left:0;right:0;padding:14px 24px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:var(--cream);border-top:1px solid var(--beige)}
.btn-prev{background:none;border:1.5px solid var(--beige);border-radius:40px;padding:10px 22px;font-size:14px;color:var(--text-mid);cursor:pointer;font-family:inherit;transition:all .15s}
.btn-prev:hover{border-color:var(--rose);color:var(--rose)}
.btn-prev:disabled{opacity:.3;cursor:default;pointer-events:none}

/* CONFIRM */
#confirm{background:var(--cream);padding:24px 24px 120px}
.confirm-title{font-family:'Noto Serif SC',"STSong",serif;font-size:20px;color:var(--text-dark);margin-bottom:6px;margin-top:8px}
.confirm-sub{font-size:14px;color:var(--text-light);margin-bottom:24px}
.confirm-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.confirm-item{display:flex;justify-content:space-between;align-items:center;background:var(--card-bg);border:1px solid var(--beige);border-radius:12px;padding:12px 16px;font-size:14px}
.confirm-item.missing-item{border-color:rgba(192,83,58,.4)}
.confirm-item-q{color:var(--text-light);flex:1;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.confirm-item-a{color:var(--text-dark);font-weight:500;flex:1.2;text-align:center}
.confirm-item-edit{color:var(--rose);font-size:13px;cursor:pointer;flex-shrink:0;padding:2px 8px;border-radius:8px;transition:background .15s}
.confirm-item-edit:hover{background:rgba(212,165,165,.15)}
.confirm-footer{position:fixed;bottom:0;left:0;right:0;padding:14px 24px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:var(--cream);border-top:1px solid var(--beige)}
.btn-confirm{width:100%;background:var(--rose);color:#fff;border:none;border-radius:48px;padding:16px;font-size:16px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-confirm:hover{background:var(--rose-dark)}
.confirm-missing-tip{font-size:13px;color:#c0533a;text-align:center;margin-top:8px;display:none}

/* LOADING — 城市卡片飞入动画 */
#loading{align-items:center;justify-content:center;background:var(--cream)}
.loading-inner{text-align:center;padding:0 24px;width:100%;max-width:420px}
.loading-cities{display:flex;justify-content:center;gap:10px;margin-bottom:28px;min-height:80px;align-items:center}
.loading-city-card{background:var(--card-bg);border:1px solid var(--beige);border-radius:14px;padding:12px 16px;font-size:22px;opacity:0;transform:translateY(20px);transition:all .5s ease;text-align:center;min-width:60px}
.loading-city-card.show{opacity:1;transform:translateY(0)}
.loading-city-name{font-size:12px;color:var(--text-light);margin-top:4px}
.loading-text{font-family:'Noto Serif SC',"STSong",serif;font-size:19px;color:var(--text-dark);margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--text-light);margin-bottom:20px}
.loading-bar-wrap{width:100%;height:3px;background:var(--beige);border-radius:4px;overflow:hidden}
.loading-bar-fill{height:100%;width:0%;background:var(--rose);border-radius:4px;transition:width .3s ease}

/* RESULT */
#result{background:var(--cream);padding-bottom:60px}
.result-header{position:relative;width:100%;height:320px;overflow:hidden;display:flex;align-items:flex-end;padding:24px}
.result-header-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.1) 55%,transparent 100%)}
.result-header-content{position:relative;z-index:1}
.result-label{font-size:13px;color:rgba(255,255,255,.85);margin-bottom:4px}
.result-city-name{font-family:'Ma Shan Zheng',"STKaiti",serif;font-size:clamp(48px,13vw,68px);color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.4);line-height:1.1}
.result-tag-label{display:inline-block;background:rgba(255,255,255,.22);color:#fff;font-size:13px;padding:4px 12px;border-radius:20px;margin-top:8px;border:1px solid rgba(255,255,255,.3)}
.result-body{padding:0 20px;max-width:600px;margin:0 auto}
.confidence-warning{margin:16px 0 0;background:rgba(230,184,162,.2);border:1px solid rgba(230,184,162,.5);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text-mid);display:none}

/* 分析文案 — 最重要内容，突出显示 */
.result-analysis-wrap{margin-top:20px}
.result-analysis{font-family:'Noto Serif SC',"STSong",serif;font-size:16px;line-height:2;color:var(--text-dark);background:var(--card-bg);border-radius:20px;padding:24px;border:1px solid var(--beige);position:relative;box-shadow:0 2px 16px rgba(212,165,165,.1)}
.result-analysis::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--warm-orange));border-radius:20px 20px 0 0}

/* section title — 简洁中文风格 */
.result-section{margin-top:28px}
.result-section-title{font-size:13px;color:var(--text-light);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.result-section-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--rose);border-radius:2px;flex-shrink:0}

.conflict-box{background:rgba(212,165,165,.1);border:1px solid rgba(212,165,165,.3);border-radius:16px;padding:20px;margin-top:16px;font-size:14px;line-height:1.8;color:var(--text-dark);display:none}
.score-bars{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.score-row{display:flex;align-items:center;gap:10px}
.score-dim{font-size:13px;color:var(--text-mid);width:66px;flex-shrink:0}
.score-track{flex:1;height:6px;background:var(--beige);border-radius:4px;overflow:hidden}
.score-bar{height:100%;background:var(--rose);border-radius:4px;transition:width 1s ease}
.score-val{font-size:12px;color:var(--text-light);width:34px;flex-shrink:0;text-align:right}
.itinerary{display:flex;flex-direction:column;gap:10px}
.day-item{display:flex;gap:14px;align-items:flex-start}
.day-dot{width:32px;height:32px;border-radius:50%;background:rgba(212,165,165,.15);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--rose);font-weight:500;flex-shrink:0}
.day-text{font-size:14px;color:var(--text-dark);line-height:1.6;padding-top:6px}
.food-card{background:var(--card-bg);border:1px solid var(--beige);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px}
.food-icon{font-size:32px}
.food-name{font-size:16px;font-weight:500;color:var(--text-dark)}
.food-desc{font-size:13px;color:var(--text-light);margin-top:2px}
.alt-cities{display:flex;gap:10px}
.alt-city-card{flex:1;background:var(--card-bg);border:1px solid var(--beige);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.alt-city-card::after{content:'换这个 →';position:absolute;bottom:0;left:0;right:0;background:var(--rose);color:#fff;font-size:11px;padding:4px 0;transform:translateY(100%);transition:transform .18s}
.alt-city-card:hover{border-color:var(--rose);transform:translateY(-3px);box-shadow:0 6px 20px rgba(212,165,165,.25)}
.alt-city-card:hover::after{transform:translateY(0)}
.alt-city-card:active{transform:scale(.97)}
.alt-city-icon{font-size:24px;margin-bottom:4px}
.alt-city-name{font-size:13px;font-weight:500;color:var(--text-dark)}
.alt-city-pct{font-size:11px;color:var(--rose);margin-top:2px}
.share-area{margin:32px 0 16px;display:flex;flex-direction:column;gap:10px}
.btn-share{width:100%;background:linear-gradient(135deg,var(--rose),var(--rose-dark));color:#fff;border:none;border-radius:16px;padding:16px 20px;font-family:inherit;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:14px;box-shadow:0 8px 24px rgba(212,165,165,.45)}
.btn-share:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(212,165,165,.55)}
.btn-share:active{transform:scale(.98)}
.btn-share-icon{font-size:28px;flex-shrink:0}
.btn-share-text{text-align:left;flex:1}
.btn-share-main{display:block;font-size:16px;font-weight:500;letter-spacing:.3px}
.btn-share-sub{display:block;font-size:12px;opacity:.85;margin-top:2px}
.btn-retry{width:100%;background:none;border:1.5px solid var(--beige);border-radius:48px;padding:13px;font-size:14px;color:var(--text-light);font-family:inherit;cursor:pointer;transition:all .15s}
.btn-retry:hover{border-color:var(--rose);color:var(--rose)}
.fix-entry{text-align:center;font-size:13px;color:var(--text-light);margin-top:8px;cursor:pointer}
.fix-entry span{color:var(--rose);text-decoration:underline}

/* 攻略卡片 */
.guide-card{background:var(--card-bg);border:1px solid var(--beige);border-radius:16px;overflow:hidden}
.guide-meta{display:flex;gap:0;border-bottom:1px solid var(--beige)}
.guide-meta-item{flex:1;padding:12px 14px;text-align:center;border-right:1px solid var(--beige)}
.guide-meta-item:last-child{border-right:none}
.guide-meta-label{font-size:11px;color:var(--text-light);margin-bottom:4px}
.guide-meta-val{font-size:13px;color:var(--text-dark);font-weight:500;line-height:1.4}
.guide-tips{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.guide-tip{font-size:13px;color:var(--text-mid);line-height:1.6}

/* 小红书按钮 */
.xhs-btn{display:flex;align-items:center;gap:14px;background:#fff1f0;border:1.5px solid #ffccc7;border-radius:14px;padding:14px 16px;text-decoration:none;transition:all .15s;cursor:pointer}
.xhs-btn:hover{background:#ffe8e6;border-color:#ff9a8d;transform:translateY(-1px)}
.xhs-icon{font-size:28px;flex-shrink:0}
.xhs-text{flex:1}
.xhs-title{font-size:15px;font-weight:500;color:#cc3333}
.xhs-sub{font-size:13px;color:#e06060;margin-top:2px}
.xhs-arrow{font-size:18px;color:#cc3333;flex-shrink:0}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-dark);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:600px){.result-header{height:380px}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-deco"><div class="deco-circle a"></div><div class="deco-circle b"></div><div class="deco-circle c"></div></div>
  <div class="home-icon">🧭</div>
  <div class="home-tag">心理旅行测评</div>
  <h1 class="home-title">测测你最近<br>最适合去哪座城市</h1>
  <p class="home-sub">20道题，读懂你藏在选择里的旅行灵魂，为你匹配专属城市。</p>
  <div class="home-pills">
    <span class="pill">🌊 治愈系</span><span class="pill">🍜 美食控</span>
    <span class="pill">🏯 文化控</span><span class="pill">🌲 自然派</span><span class="pill">☕ 慢生活</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始测试</button>
  <p class="home-note">约5分钟 · 33个城市备选</p>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-top">
    <div class="progress-header"><span id="progress-text">第 1 / 20 题</span><span id="progress-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="question-num" id="q-num">Q1</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
  </div>
  <div class="quiz-nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQuestion()" disabled>← 上一题</button>
    <span style="font-size:13px;color:var(--text-light)" id="q-hint"></span>
  </div>
</div>

<!-- CONFIRM（轻量版，仅在有未答题时出现） -->
<div id="confirm" class="screen">
  <div style="max-width:600px;margin:0 auto;width:100%;padding:40px 24px;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">⚠️</div>
    <h2 class="confirm-title" style="margin-bottom:8px">还有题目没有作答</h2>
    <p class="confirm-sub" style="margin-bottom:32px">请回去补全所有题目，结果会更准哦</p>
    <div id="confirm-list" style="text-align:left;margin-bottom:24px"></div>
    <button class="btn-confirm" onclick="backToQuiz()" style="background:none;color:var(--rose);border:1.5px solid var(--rose);margin-bottom:12px">← 回去补全</button>
    <br>
    <button class="btn-confirm" onclick="generateResult()" style="opacity:.6;font-size:14px;padding:12px">跳过未答的题，直接生成</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div class="loading-inner">
    <div class="loading-cities" id="loading-cities"></div>
    <div class="loading-text" id="loading-text">正在解读你的灵魂…</div>
    <div class="loading-sub">为你匹配最适合的城市</div>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loading-bar-fill"></div></div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-header" id="result-header">
    <div class="result-header-overlay"></div>
    <div class="result-header-content">
      <div class="result-label" id="result-month-label"></div>
      <div class="result-city-name" id="result-city-name"></div>
      <div class="result-tag-label" id="result-personality"></div>
    </div>
  </div>
  <div class="result-body">
    <div class="confidence-warning" id="confidence-warning">⚠️ 你的答案有些矛盾，结果仅供参考</div>

    <!-- 旅行灵魂分析（最重要，放最前，去掉section-title） -->
    <div class="result-analysis-wrap">
      <div class="result-analysis" id="result-analysis"></div>
    </div>

    <div class="conflict-box" id="conflict-box">
      <div style="font-size:20px;margin-bottom:8px">🌟</div>
      <div id="conflict-text"></div>
    </div>

    <!-- 相似备选城市 -->
    <div class="result-section" id="alt-cities-section">
      <div class="result-section-title">你可能也适合这些城市</div>
      <div class="alt-cities" id="alt-cities"></div>
    </div>

    <!-- 维度画像 -->
    <div class="result-section" id="score-section">
      <div class="result-section-title">你的旅行维度</div>
      <div class="score-bars" id="score-bars"></div>
    </div>

    <!-- 行程 -->
    <div class="result-section">
      <div class="result-section-title">三天怎么玩</div>
      <div class="itinerary" id="itinerary"></div>
    </div>

    <!-- 美食 -->
    <div class="result-section">
      <div class="result-section-title">去了一定要吃</div>
      <div class="food-card" id="food-card"></div>
    </div>

    <!-- 旅游攻略 -->
    <div class="result-section" id="guide-section">
      <div class="result-section-title">出发前要知道</div>
      <div class="guide-card" id="guide-card"></div>
    </div>

    <!-- 小红书直达 -->
    <div class="result-section">
      <div class="result-section-title">找更多攻略</div>
      <a id="xhs-link" class="xhs-btn" target="_blank" rel="noopener">
        <span class="xhs-icon">📕</span>
        <div class="xhs-text">
          <div class="xhs-title">小红书搜索攻略</div>
          <div class="xhs-sub" id="xhs-keyword"></div>
        </div>
        <span class="xhs-arrow">→</span>
      </a>
    </div>

    <!-- 分享区 -->
    <div class="share-area">
      <button class="btn-share" onclick="shareResult()">
        <span class="btn-share-icon">✈️</span>
        <span class="btn-share-text">
          <span class="btn-share-main">分享给要一起去的人</span>
          <span class="btn-share-sub">让他/她也来测测</span>
        </span>
      </button>
      <button class="btn-retry" onclick="restartQuiz()">重新测一次</button>
    </div>
    <div class="fix-entry" onclick="goToConfirm()">🤔 觉得结果不准？<span>点这里修正答案</span></div>
    <div style="height:48px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const questions=[

   analyses:["你选择地铁穿梭，你喜欢繁华商业街，你的周末是聚会探店暴走。上海是你的主场。\n这里快得让你兴奋，多元得让你着迷，精致得让你忍不住拍照。你和上海之间有一种天然的默契。",
    "你是那种走进上海会说「对，就是这里」的人。外滩的建筑、新天地的精致、安福路的文艺、弄堂里的市井，上海把所有你想要的体验都塞进了一个坐标里。",
    "上海不是最好玩的城市，但它是最「懂你」的城市。\n如果你觉得别的地方有点无聊，来上海。这里永远有你没见过的东西。"],
   itinerary:["Day1：外滩-南京路-新天地，经典路线走一遍","Day2：徐汇区文艺漫游，武康路+安福路+西岸","Day3：豫园-城隍庙扫货，晚上陆家嘴夜景收尾"],
   food:"生煎包",foodDesc:"底脆皮薄，汤汁迸发，一口下去才懂上海",foodIcon:"🥟",guide:{"season": "3-5月 · 9-11月", "budget": "人均 600-1200元/天", "tips": ["🏙️ 外滩对岸陆家嘴看夜景角度更好", "🛍️ 安福路武康路周末人多，工作日去更舒适", "🚇 地铁覆盖全面，出行首选"], "xhs": "上海旅游攻略"}},
  {name:"桂林",icon:"⛰️",natural:5,social:2,plan:4,slow:4,culture:2,heal:4,warm:4,taste:2,scene:"mountain",c1:"#4A7A42",c2:"#7BAA72",
   tag:"山水画中人",
   analyses:["你想在窗外看到山峦云雾，你愿意一个人随便逛，你喜欢绿+棕的配色。\n桂林就是你脑子里那幅山水画的真实版本。漓江的水，阳朔的田，喀斯特地貌的峰林，全是你梦里想去的地方。",
    "如果你觉得中国的风景应该是那种山清水秀、如诗如画的感觉，桂林会让你觉得：原来真的存在。\n遇龙河竹筏漂流，十里画廊骑行，这里是纸上走出来的仙境。",
    "你不需要人山人海，你只需要桂林。\n一片田，一条江，一座山，一个人，这就是你要的旅行。"],
   itinerary:["Day1：漓江游船，山水全景尽收眼底","Day2：阳朔骑行十里画廊，遇龙河竹筏漂流","Day3：西街溜达，找找文艺小店"],
   food:"桂林米粉",foodDesc:"汤底清甜，卤香扑鼻，一碗下肚神清气爽",foodIcon:"🍝",guide:{"season": "3-5月 · 9-11月", "budget": "人均 300-500元/天", "tips": ["🛶 漓江游船从桂林到阳朔约4小时，提前订票", "🚲 阳朔骑行遇龙河沿线是精华", "🌧️ 雨季山水朦胧最美，不要怕下雨"], "xhs": "桂林旅游攻略"}},
  {name:"拉萨",icon:"🏔️",natural:5,social:1,plan:3,slow:3,culture:5,heal:4,warm:1,taste:1,scene:"plateau",c1:"#6A5A9A",c2:"#9E88CC",
   tag:"灵魂避风港",
   analyses:["你的选择里有一种「向往远处」的信号。你想去最不像城市的地方，你想一个人待在只有自己的美景里。\n拉萨，3600米的高原，离天最近的地方，是那些内心需要被清空一次的人的去处。",
    "你对这次旅行的需求不是放松，而是重新开始。\n拉萨会给你这个机会。布达拉宫的庄严，大昭寺的香烟，八廓街的转经人，这里有一种无法解释的宁静会慢慢渗进你。",
    "去一次拉萨，你会用很久去消化那段时间里你想明白的事。\n这不是一趟旅行，这是一次对话——你和自己的对话。"],
   itinerary:["Day1：适应高原，布达拉宫广场远观，大昭寺朝圣","Day2：八廓街转经，色拉寺辩经，藏餐馆品藏面","Day3：羊卓雍错一日游，蓝色圣湖震撼人心"],
   food:"藏面",foodDesc:"手工拉制，牛肉汤底温暖，高原早晨的第一口热气",foodIcon:"🍜",guide:{"season": "5-10月（避开冬季）", "budget": "人均 400-700元/天", "tips": ["✈️ 抵达后前两天不要剧烈运动，充分适应高原", "🛐 大昭寺门票免费，建议早上8点前进入", "🎟️ 布达拉宫需提前预约，每日限流"], "xhs": "拉萨旅游攻略"}},
  {name:"长沙",icon:"🌶️",natural:1,social:4,plan:2,slow:3,culture:2,heal:3,warm:4,taste:5,scene:"city",c1:"#A03A2E",c2:"#D4665A",
   tag:"烟火诗人",
   analyses:["你喜欢热闹，你爱美食，你的周末离不开探店。\n长沙是你的美食圣地。文和友、茶颜悦色、炸神仙、臭豆腐、口味虾，这座城市的美食密度让每一个吃货都找不到下班的理由。",
    "你需要一座会让你兴奋起来的城市。长沙就是。这里的夜生活从晚上10点才刚刚开始，橘子洲头的日出和超级文和友的宵夜，都是长沙给你的惊喜。",
    "长沙是被严重低估的宝藏城市。年轻、好吃、有劲儿。\n去了你会后悔没早去。"],
   itinerary:["Day1：岳麓书院+橘子洲，上午文化下午发呆","Day2：太平老街扫街，夜宵文和友多吃几样","Day3：湘江边骑行，顺路茶颜悦色每隔100米喝一杯"],
   food:"口味虾",foodDesc:"麻辣鲜香，一口接一口，停不下来是真的",foodIcon:"🦞",guide:{"season": "3-5月 · 9-11月", "budget": "人均 300-500元/天", "tips": ["🧋 茶颜悦色排队正常现象，建议错峰", "🌶️ 口味虾在宵夜场最正宗，晚上10点后最热闹", "🏔️ 岳麓山爬山免费，搭配橘子洲1天搞定"], "xhs": "长沙旅游攻略"}},
  {name:"威海",icon:"🌊",natural:4,social:2,plan:4,slow:4,culture:2,heal:2,warm:3,taste:3,scene:"ocean",c1:"#2A6A8A",c2:"#5BA0BE",
   tag:"海风隐居者",
   analyses:["你想要一片没有人群的海，你想一个人慢慢走，你不需要打卡景点。\n威海是那种「去了才知道」的城市。洁净的蓝，干净的街，没有厦门的拥挤，没有青岛的人潮，只有海和你。",
    "你需要的不是热闹，你需要的是真正的休息。威海会给你。荣成天鹅湖、刘公岛的历史静默、石岛的海边清晨，这里的慢是真实的慢。",
    "威海就像一个被低估的老朋友——安静，可靠，让你越待越不想走。"],
   itinerary:["Day1：国际海水浴场漫步，海边咖啡馆发呆","Day2：刘公岛轮渡，感受甲午海战历史","Day3：荣成天鹅湖观鸟，返程前吃一顿海鲜"],
   food:"海胆刺身",foodDesc:"鲜甜微苦，入口即化，威海最骄傲的一道菜",foodIcon:"🍣",guide:{"season": "6-9月", "budget": "人均 300-500元/天", "tips": ["🦢 荣成天鹅湖观鸟季在11月至次年3月", "⛴️ 刘公岛轮渡+门票约90元，留半天时间", "🦞 海鲜市场买海鲜自己加工最实惠"], "xhs": "威海旅游攻略"}},
  {name:"泉州",icon:"🏮",natural:3,social:3,plan:4,slow:4,culture:5,heal:3,warm:4,taste:5,scene:"ancient",c1:"#8A4E2A",c2:"#C4805A",
   tag:"烟火诗人",
   analyses:["你对文化的兴趣是真实的，你喜欢古城小巷，你愿意带手工艺品回家。\n泉州是中国最被低估的古城，没有之一。南宋古街、开元寺、蟳埔女的头花，这座城市的每一个角落都有一个故事。",
    "泉州不是网红城市，所以去泉州的人，都是真的爱旅行的人。闽南文化的根就在这里，洛阳桥的古老，崇武古城的海风，让你感觉时间从未流走。",
    "你去泉州，会发现一座真实活着的古城。不是博物馆，是烟火气。\n一碗肉燕，一盘海蛎煎，配上骑楼下的午后，足够了。"],
   itinerary:["Day1：西街-开元寺漫步，骑楼下喝茶","Day2：蟳埔村簪花围体验，感受海洋文明","Day3：崇武古城海边，顺路品惠安咸饭"],
   food:"海蛎煎",foodDesc:"蚵仔鲜嫩，蛋液金黄，闽南最家常的一道幸福",foodIcon:"🍳",guide:{"season": "3-5月 · 10-12月", "budget": "人均 300-500元/天", "tips": ["🏮 开元寺免费，建议停留2小时", "🌸 蟳埔村簪花体验约50-100元，超出片", "🍳 海蛎煎在西街周边小店找，别去网红店"], "xhs": "泉州旅游攻略"}},
  {name:"腾冲",icon:"🌋",natural:5,social:1,plan:5,slow:5,culture:4,heal:5,warm:2,taste:2,scene:"forest",c1:"#4A7A3A",c2:"#82A86A",
   tag:"云隐者",
   analyses:["你几乎所有的选择都在说：给我一个安静的、自然的、可以慢下来的地方。\n腾冲是中国最适合消失一段时间的城市。热海温泉、北海湿地、银杏村的金黄，这里的每一个角落都在告诉你：不用赶，不用急。",
    "你需要一次真正的断联之旅。腾冲离城市足够远，离自然足够近。\n火山地热的奇景，保山翡翠的温润，少数民族的炊烟，这里有你在都市里找不到的时间感。",
    "腾冲是那种去了就不想走的地方。\n因为那里的时间，比任何地方都流得慢一点。"],
   itinerary:["Day1：热海地热公园，泡温泉泡到忘记时间","Day2：北海湿地漂浮草甸，候鸟季最治愈","Day3：和顺古镇漫步，翡翠市场淘淘石头"],
   food:"大救驾",foodDesc:"炒饵块配腊肉，香糯有嚼劲，腾冲人的家常饭",foodIcon:"🍛",guide:{"season": "4-10月（银杏季10-11月最美）", "budget": "人均 300-500元/天", "tips": ["♨️ 热海地热景区值得去，大滚锅最震撼", "🌿 北海湿地草甸漂浮感很治愈，雨季更壮观", "🚗 景点分散，建议包车，约200元/天"], "xhs": "腾冲旅游攻略"}},
  {name:"杭州",icon:"🏛️",natural:4,social:3,plan:3,slow:4,culture:4,heal:4,warm:4,taste:4,scene:"ancient",c1:"#4A7868",c2:"#7BA896",
   tag:"山河拾光者",
   analyses:["你的选择很平衡——喜欢自然，也接受人文；想慢下来，也不排斥探索。\n杭州是最懂平衡的城市。西湖的诗意，灵隐的禅意，河坊街的烟火，这里给你所有你想要的，还不用做选择。",
    "你是那种对「美」很敏感的人，无论是风景的美还是食物的美。\n杭州的美是刚刚好的美，不张扬，不做作。断桥不是最壮观的桥，但它是最有故事的。",
    "去杭州吧，带上你那颗慢下来的心。\n雨中西湖，苏堤春晓，河坊街上一碗片儿川，这是属于你的节奏。"],
   itinerary:["Day1：西湖环湖漫步，断桥残雪+雷峰塔","Day2：灵隐寺祈福，飞来峰看石刻，下午龙井村品茶","Day3：南宋御街-河坊街，小河直街市井收尾"],
   food:"东坡肉",foodDesc:"肥而不腻，入口即化，苏轼留给杭州的最美礼物",foodIcon:"🍖",guide:{"season": "3-4月（春）· 10-11月（秋）", "budget": "人均 400-700元/天", "tips": ["☕ 龙井茶园在梅家坞，4月采茶季最美", "🌊 西湖免费，雨中西湖是隐藏彩蛋", "🛥️ 西湖游船100元左右，可以讲价"], "xhs": "杭州旅游攻略"}},
  {name:"苏州",icon:"🌸",natural:3,social:2,plan:4,slow:4,culture:5,heal:4,warm:4,taste:4,scene:"ancient",c1:"#6A5A90",c2:"#9B8EC0",
   tag:"烟火诗人",
   analyses:["你是真正欣赏细腻之美的人。你选莫奈不选梵高，你带手工艺品而不是冰箱贴，你想偶遇古街小店。\n苏州是为你定制的。每一座园林都是一首诗，每一条小巷都有故事，每一碗面都值得认真吃。",
    "你需要的不是刺激，你需要的是精致。苏州的精致是骨子里的，拙政园的假山、周庄的倒影、平江路的青石板，这里的美是可以细细品的。",
    "去苏州，放慢你的脚步。\n这座城市的美，是需要你停下来，才看得见的。"],
   itinerary:["Day1：拙政园+狮子林，园林精华走一遍","Day2：平江路慢逛，买苏绣纪念品，喝碗藏书羊肉面","Day3：周庄古镇一日游，水乡倒影最治愈"],
   food:"苏式汤面",foodDesc:"宽汤细面，浇头丰盛，每一碗都是苏州人的清晨仪式",foodIcon:"🍜",guide:{"season": "3-5月 · 9-11月", "budget": "人均 400-700元/天", "tips": ["🌷 拙政园旺季建议早8点入园，人少景美", "🚤 平江路夜游最美，白天人挤不好逛", "🚌 周庄古镇在昆山，从苏州坐客运约1小时"], "xhs": "苏州旅游攻略"}},
  {name:"重庆",icon:"🌉",natural:3,social:5,plan:1,slow:2,culture:3,heal:2,warm:4,taste:5,scene:"city",c1:"#A03A2A",c2:"#D46E5A",
   tag:"都市游牧者",
   analyses:["你选择随便逛，你喜欢聚会探店，你的周末有点累但也有点爱。\n重庆是你的那种城市——它不让你无聊，它让你兴奋，它让你不断发现新的东西。\n立体迷宫般的城市结构，3D感的山城地景，让重庆永远有惊喜等着你。",
    "重庆适合那些不怕迷路的人。洪崖洞的层叠霓虹，磁器口的烟火喧嚣，千厮门大桥下的江边，这座城市在每一个转角给你一个新的世界。",
    "重庆是中国最会给人带来惊喜的城市。\n去之前你不信，去了你就懂了。"],
   itinerary:["Day1：洪崖洞夜景，千厮门大桥走走，嘉陵江边吹风","Day2：磁器口古镇，顺坡下山吃串串","Day3：解放碑步行街，来福士观景台俯瞰两江交汇"],
   food:"串串香",foodDesc:"竹签涮涮，麻辣鲜香，重庆人的一日三餐外加宵夜",foodIcon:"🍢",guide:{"season": "3-5月 · 9-11月", "budget": "人均 400-600元/天", "tips": ["🌃 洪崖洞晚上8点后最好看，白天基本没啥", "🚠 长江索道体验城市交通感，10元/次", "🍢 串串香人均50-80元，磁器口附近最正宗"], "xhs": "重庆旅游攻略"}},
  {name:"广州",icon:"🌺",natural:1,social:4,plan:2,slow:3,culture:3,heal:2,warm:5,taste:5,scene:"city",c1:"#A06A1A",c2:"#D4A04A",
   tag:"碳水教父",
   analyses:["你爱吃，你爱热闹，你喜欢温暖的气候。广州是天选之地。\n这座城市把饮食提升到了艺术的高度，一盅两件是早茶，烧腊白切鸡是午饭，炒河粉是宵夜，广州人对吃的认真你会佩服。",
    "你需要一座不把你当外人的城市。广州就是。这里温暖、包容，永远在聊吃的。",
    "去广州，就为了吃。\n从早茶开始，到宵夜结束，中间再插上几顿，你会发现一天24小时根本不够用。"],
   itinerary:["Day1：陶陶居喝早茶，上下九步行街闲逛","Day2：北京路骑行，永庆坊感受西关风情","Day3：荔湾广场，越秀公园，晚上大排档宵夜"],
   food:"虾饺",foodDesc:"皮薄馅鲜，晶莹剔透，广州茶楼永恒的镇场之宝",foodIcon:"🥟",guide:{"season": "10月-次年4月（避开夏季酷热）", "budget": "人均 400-700元/天", "tips": ["🍵 早茶选老字号：陶陶居、莲香楼、点都德", "🌺 永庆坊免费逛，岭南建筑最出片", "🌙 宵夜去天河棠下，当地人都在这里"], "xhs": "广州旅游攻略"}},
  {name:"丽江",icon:"🌙",natural:4,social:3,plan:5,slow:5,culture:4,heal:5,warm:3,taste:3,scene:"ancient",c1:"#8A5A3A",c2:"#BC8A6A",
   tag:"时光猎人",
   analyses:["你对古城、对慢、对治愈有强烈的需求。你愿意放慢脚步，你想带手工艺品回家，你喜欢在画里待着。\n丽江古城就是那幅画，纳西族的传统、玉龙雪山的白、泸沽湖的蓝，都是你来这里的理由。",
    "丽江适合那些心里有点什么、说不清楚的人。\n古城的石板路、四方街的音乐、束河的宁静，这座城市会帮你把那点说不清楚的东西慢慢说清楚。",

function calcPenalizedScores(ans,extreme){
  const s={natural:0,social:0,plan:0,slow:0,culture:0,heal:0,warm:0,taste:0};
  ans.forEach((a,qi)=>{
    if(a===null)return;
    const m=dimMap[qi][a];
    let pen=1.0;
    extreme.forEach(c=>{if(c.questions.includes(qi))pen=Math.min(pen,c.penalty);});
    for(const[d,v]of Object.entries(m))s[d]=(s[d]||0)+v*pen;
  });
  return s;
}

// FIX: proper normalization — raw scores → 1–5 scale matching city scores
function normalize(raw){
  const n={};
  for(const d of Object.keys(dimMax)){
    const clamped=Math.max(0,Math.min(dimMax[d],raw[d]||0));
    n[d]=1+(clamped/dimMax[d])*4;
  }
  return n;
}

function detectConflicts(ans){
  const extreme=[],real=[];
  if(ans[9]===0&&ans[10]===3)extreme.push({questions:[9,10],penalty:0.5});
  if(ans[2]===1&&ans[13]===0)extreme.push({questions:[2,13],penalty:0.6});
  if(ans[0]===3&&ans[7]===0)extreme.push({questions:[0,7],penalty:0.6});
  if(ans[2]===1&&ans[13]===3)real.push('ambivert');
  if((ans[5]===0||ans[5]===2)&&ans[11]===1)real.push('natureAndFood');
  return{extreme,real};
}

function calcConfidence(ans,extreme){
  let c=100;
  c-=extreme.length*15;
  if(timePerQ.length>0){const avg=timePerQ.reduce((a,b)=>a+b,0)/timePerQ.length;if(avg<1)c-=20;if(avg<.5)c-=15;}
  const filled=ans.filter(a=>a!==null);
  if(filled.length>=5&&filled.every(a=>a===filled[0]))c-=30;
  if(returnCount>=1)c+=10;if(returnCount>=3)c+=5;
  // FIX: use time since confirm page opened
  if((Date.now()-confirmEnterTime)/1000<2)c-=10;
  return Math.max(0,Math.min(100,c));
}

// 城市硬性过滤条件（防止某些城市被不合适的用户匹配）
const cityFilters={
  '哈尔滨': u=>u.warm<1.8,
  '稻城':   u=>u.natural>3.5&&u.heal>3.0,  // 只推给真正的自然控+治愈需求高的用户   // 只推给偏好凉爽/寒冷气候的人
};

function getFinalWeights(){
  // 基础权重 × 季节修正
  const base=dimWeights;
  const m=new Date().getMonth()+1;
  let seasonal={};
  if(m>=6&&m<=8)     seasonal={warm:1.4};          // 夏：暖度权重提升
  else if(m>=11||m<=2) seasonal={warm:1.6,heal:1.2}; // 冬：暖度最重要
  else                 seasonal={natural:1.1,culture:1.1}; // 春秋：自然文化加成
  const dims=['natural','social','plan','slow','culture','heal','warm','taste'];
  const w={};
  for(const d of dims) w[d]=(base[d]||1)*(seasonal[d]||1);
  return w;
}

function euclid(normScores,city,w){
  const dims=['natural','social','plan','slow','culture','heal','warm','taste'];
  let s=0;for(const d of dims){const diff=(normScores[d]||1)-city[d];s+=(w[d]||1)*diff*diff;}
  return Math.sqrt(s);
}

function matchCities(normScores){
  const w=getFinalWeights();
  // 先过滤不适合该用户的城市
  const pool=cities.filter(c=>!cityFilters[c.name]||cityFilters[c.name](normScores));
  const scored=pool.map(c=>({city:c,dist:euclid(normScores,c,w)}));
  scored.sort((a,b)=>a.dist-b.dist);
  // 当top1和top2距离非常接近时，小概率随机交换（增加结果多样性）
  if(scored.length>1&&scored[1].dist-scored[0].dist<0.8&&Math.random()<0.15)
    [scored[0],scored[1]]=[scored[1],scored[0]];
  return scored;
}

// FIX: softmax probabilities that sum to ~100%
function softmaxTop3(ranked){
  const top=ranked.slice(0,3);
  const logits=top.map(r=>-r.dist);
  const mx=Math.max(...logits);
  const exps=logits.map(l=>Math.exp(l-mx));
  const total=exps.reduce((a,b)=>a+b,0);
  return top.map((r,i)=>({city:r.city,pct:Math.round(exps[i]/total*100)}));
}

function getPersonality(norm){
  const s={};for(const[k,v]of Object.entries(norm))s[k]=(v-1)*2.5;
  for(const rule of personalityRules){
    let ok=true;
    for(const[d,[lo,hi]]of Object.entries(rule.conds)){if((s[d]||0)<lo||(s[d]||0)>hi){ok=false;break;}}
    if(ok)return rule.label;
  }
  return"🌏 旅行探索者";
}

// ── GENERATE ──
function generateResult(){
  showScreen('loading');

  // 城市卡片飞入动画
  const cityIcons = cities.map(c=>({icon:c.icon,name:c.name}));
  const picks = [...cityIcons].sort(()=>Math.random()-.5).slice(0,3);
  const container = document.getElementById('loading-cities');
  container.innerHTML = picks.map(c=>`<div class="loading-city-card"><div>${c.icon}</div><div class="loading-city-name">${c.name}</div></div>`).join('');
  const cards = container.querySelectorAll('.loading-city-card');
  cards.forEach((card,i)=>setTimeout(()=>card.classList.add('show'),i*150+100));

  // 进度条动画
  const bar = document.getElementById('loading-bar-fill');
  let pct=0; const barT=setInterval(()=>{pct=Math.min(90,pct+3);bar.style.width=pct+'%';},80);

  // 文案轮播
  const msgs=["正在解读你的灵魂…","分析你的旅行性格…","匹配最适合的城市…","快好了，稍等一下…"];
  let li=0; const el=document.getElementById('loading-text');
  const t=setInterval(()=>{
    el.style.opacity=0;
    setTimeout(()=>{el.textContent=msgs[li++%msgs.length];el.style.opacity=1;},200);
  },700);
  el.style.transition='opacity .2s';

  setTimeout(()=>{
    clearInterval(t); clearInterval(barT);
    bar.style.width='100%';
    const{extreme,real}=detectConflicts(answers);
    const raw=calcPenalizedScores(answers,extreme);
    const norm=normalize(raw);
    const conf=calcConfidence(answers,extreme);
    const ranked=matchCities(norm);
    const topCity=ranked[0].city;
    const personality=getPersonality(norm);
    _lastRanked=ranked;_lastRaw=raw;_lastNorm=norm;_lastConf=conf;_lastReal=real;
    renderResult(topCity,raw,norm,conf,real,ranked);
    analytics.trackComplete(topCity,conf,real,personality);
    showScreen('result');
  },2600);
}

// ── RENDER RESULT ──
function renderResult(city,raw,norm,conf,real,ranked){
  const month=new Date().getMonth();
  const hdr=document.getElementById('result-header');
  // Set gradient as immediate fallback while photo loads
  hdr.querySelectorAll('.city-bg-img,svg').forEach(el=>el.remove());
  hdr.style.background=`linear-gradient(160deg,${city.c1}dd,${city.c2}ee)`;
  // Async load Unsplash photo — updates header when ready
  fetchCityPhoto(city).then(url=>setHeaderPhoto(url,city));

  document.getElementById('result-city-name').textContent=city.name;
  document.getElementById('result-month-label').textContent=`🔮 你的${monthNames[month]}旅行目的地`;
  document.getElementById('result-personality').textContent=getPersonality(norm);

  const warn=document.getElementById('confidence-warning');
  warn.style.display=conf<60?'block':'none';

  // 永远显示3个相似备选城市（跳过第0名即当前城市）
  const altTop=ranked.slice(1,4);
  document.getElementById('alt-cities').innerHTML=altTop.map(r=>`
    <div class="alt-city-card" onclick="switchCity('${r.city.name}')">
      <div class="alt-city-icon">${r.city.icon}</div>
      <div class="alt-city-name">${r.city.name}</div>
      <div class="alt-city-sub">${r.city.tag||'也很适合你'}</div>
    </div>`).join('');

  // 分析文案：按段落渲染，避免空行问题
  const aIdx=Math.floor(Math.random()*city.analyses.length);
  const analysisHtml = city.analyses[aIdx]
    .split('\n')
    .filter(p=>p.trim())
    .map(p=>`<p style="margin-bottom:1em">${p}</p>`)
    .join('');
  document.getElementById('result-analysis').innerHTML=analysisHtml;

  // conflict
  const cb=document.getElementById('conflict-box');
  if(real.length>0){
    cb.style.display='block';
    document.getElementById('conflict-text').innerHTML='你是一个<strong>多面体</strong>。<br>'+real.map(k=>conflictTexts[k]||'').join('<br>')+`<br><br>所以我们为你推荐了 <strong>${city.name}</strong>——一座允许你同时拥有多种体验的城市。`;
  }else cb.style.display='none';

  // scores
  const ss=document.getElementById('score-section');
  if(conf>=60){
    ss.style.display='block';
    const dims=[['natural','亲近自然'],['social','社交能量'],['slow','慢节奏'],['culture','文化兴趣'],['heal','治愈需求'],['warm','温暖偏好'],['taste','美食驱动']];
    document.getElementById('score-bars').innerHTML=dims.map(([d,label])=>{
      const pct=Math.round(Math.max(0,Math.min(100,((raw[d]||0)/dimMax[d])*100)));
      return`<div class="score-row"><span class="score-dim">${label}</span><div class="score-track"><div class="score-bar" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
    }).join('');
  }else ss.style.display='none';

  document.getElementById('itinerary').innerHTML=city.itinerary.map((d,i)=>`<div class="day-item"><div class="day-dot">D${i+1}</div><div class="day-text">${d}</div></div>`).join('');
  document.getElementById('food-card').innerHTML=`<div class="food-icon">${city.foodIcon}</div><div><div class="food-name">${city.food}</div><div class="food-desc">${city.foodDesc}</div></div>`;

  // 旅游攻略卡片
  if(city.guide){
    const g=city.guide;
    document.getElementById('guide-card').innerHTML=`
      <div class="guide-meta">
        <div class="guide-meta-item"><div class="guide-meta-label">最佳季节</div><div class="guide-meta-val">${g.season}</div></div>
        <div class="guide-meta-item"><div class="guide-meta-label">人均消费</div><div class="guide-meta-val">${g.budget}</div></div>
      </div>
      <div class="guide-tips">${g.tips.map(t=>`<div class="guide-tip">${t}</div>`).join('')}</div>`;
    document.getElementById('guide-section').style.display='block';
  } else {
    document.getElementById('guide-section').style.display='none';
  }

  // 小红书搜索直达
  const xhsKeyword=city.guide?.xhs||`${city.name}旅游攻略`;
  const xhsUrl=`https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(xhsKeyword)}&source=web_search_result_notes`;
  document.getElementById('xhs-link').href=xhsUrl;
  document.getElementById('xhs-keyword').textContent=`搜索「${xhsKeyword}」`;

}

async function fetchCityPhoto(city){
  if(photoCache[city.name]) return photoCache[city.name];

  // 【第一层】本地图片优先
  const local=cityPhotos[city.name];
  if(local){ photoCache[city.name]=local; return local; }

  // 【第二层】Unsplash API 兜底
  const query=cityQueries[city.name]||city.name+' China travel';
  try{
    const url=`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=5&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('api error');
    const data=await res.json();
    if(data.results&&data.results.length>0){
      const best=data.results.reduce((a,b)=>b.likes>a.likes?b:a);
      fetch(best.links.download_location+'&client_id='+UNSPLASH_KEY).catch(()=>{});
      photoCache[city.name]=best.urls.regular;
      return best.urls.regular;
    }
  }catch(e){}

  // 【第三层】返回 null → 调用方降级为渐变色
  return null;
}

function setHeaderPhoto(url,city){
  const hdr=document.getElementById('result-header');

  if(url){

    img.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center;';

  } else {
    // graceful fallback: solid gradient
    hdr.style.background=`linear-gradient(160deg,${city.c1}dd,${city.c2}dd)`;
  }
}

  const city=cities.find(c=>c.name===cityName);

// ── ANALYTICS — Supabase 埋点系统 ──
// 追踪：完成率 / 城市分布 / 题目选项分布 / 矛盾&置信度 / 分享率
// ══════════════════════════════════════════════════════
const analytics = (() => {
  const URL  = 'https://udjczeowhogqlqcevvua.supabase.co';
  const KEY  = 'sb_publishable_8tlKgZBd6VmAAIgnBksmfA_jOyXakoi';

  let _sessionId  = null;   // 写入 quiz_sessions 后返回的 uuid
  let _completed  = false;  // 是否已完成结果页
  let _quizActive = false;  // 是否正在答题中

  // ── 底层请求 ──
  async function _post(path, body){
    try{
      const res = await fetch(`${URL}/rest/v1/${path}`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`,
          'Prefer':        'return=representation'
        },
        body: JSON.stringify(body)
      });
      if(!res.ok) return null;
      return await res.json();
    } catch(e){ return null; }
  }

  async function _patch(path, body){
    try{
      await fetch(`${URL}/rest/v1/${path}`, {
        method: 'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`,
          'Prefer':        'return=minimal'
        },
        body: JSON.stringify(body)
      });
    } catch(e){}
  }

  async function _rpc(fn, body){
    try{
      await fetch(`${URL}/rest/v1/rpc/${fn}`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`
        },
        body: JSON.stringify(body)
      });
    } catch(e){}
  }

  // ── 1. 用户开始答题 ──
  function trackStart(){
    _sessionId = null;
    _completed = false;
    _quizActive = true;
  }

  // ── 2. 中途退出埋点（visibilitychange 触发）──
  function _trackDropoff(){
    if(_completed || !_quizActive) return;
    // sendBeacon 在页面关闭时仍可发出
    const body = JSON.stringify({ dropped_at_q: currentQ + 1 });
    navigator.sendBeacon(
      `${URL}/rest/v1/quiz_dropoffs`,
      new Blob([body], { type: 'application/json' })
    );
  }

  // ── 3. 完成测试，写入完整 session ──
  async function trackComplete(city, confidence, conflicts, personality){
    _completed  = true;
    _quizActive = false;

    const avgTime = timePerQ.length
      ? +(timePerQ.reduce((a,b)=>a+b,0)/timePerQ.length).toFixed(2)
      : null;

    const rows = await _post('quiz_sessions', {
      result_city:    city.name,
      personality_tag: personality,
      confidence:     Math.round(confidence),
      has_conflict:   conflicts.length > 0,
      conflict_types: conflicts,
      answers:        answers,          // int[15]
      avg_time_per_q: avgTime,
      return_count:   returnCount,
      shared:         false,
      user_agent:     navigator.userAgent.slice(0, 200)
    });

    if(rows && rows[0]) _sessionId = rows[0].id;

    // 原子自增 question_stats & city_stats
    _rpc('increment_stats', {
      answers_arr: answers,
      city_name:   city.name
    });
  }

  // ── 4. 点击分享 ──
  async function trackShare(){
    if(!_sessionId) return;
    _patch(`quiz_sessions?id=eq.${_sessionId}`, { shared: true });
  }

  // 页面隐藏时触发退出埋点
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'hidden') _trackDropoff();
  });

  return { trackStart, trackComplete, trackShare };
})();
