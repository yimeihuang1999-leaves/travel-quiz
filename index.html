<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>测测你最近最适合去哪个城市旅游</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style id="fb-font" disabled>
  body{font-family:"PingFang SC","Microsoft YaHei",sans-serif!important}
  .home-title,.question-text,.result-city-name{font-family:"STKaiti","KaiTi",serif!important}
</style>
<style>
:root{
  --cream:#FDF4E3;--beige:#E8D9C6;--rose:#D4A5A5;--rose-dark:#B88080;
  --warm-orange:#E6B8A2;--text-dark:#3A2E2A;--text-mid:#6B5344;
  --text-light:#9C8070;--card-bg:rgba(255,255,255,0.72);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Noto Sans SC',"PingFang SC","Microsoft YaHei",sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* HOME */
#home{align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;background:radial-gradient(ellipse at 60% 20%,#F5E6CE 0%,#FDF4E3 60%)}
.home-deco{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
.deco-circle{position:absolute;border-radius:50%;opacity:.18}
.deco-circle.a{width:300px;height:300px;background:var(--rose);top:-80px;right:-60px}
.deco-circle.b{width:180px;height:180px;background:#C8B8A2;bottom:60px;left:-50px}
.deco-circle.c{width:80px;height:80px;background:var(--warm-orange);bottom:200px;right:40px}
.home-icon{font-size:72px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.home-tag{display:inline-block;background:var(--rose);color:#fff;font-size:12px;padding:4px 14px;border-radius:20px;margin-bottom:18px;letter-spacing:1px}
.home-title{font-family:'Ma Shan Zheng',"STKaiti","KaiTi",serif;font-size:clamp(26px,6vw,40px);color:var(--text-dark);line-height:1.3;margin-bottom:12px}
.home-sub{font-size:15px;color:var(--text-mid);line-height:1.7;max-width:340px;margin:0 auto 32px}
.home-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:36px}
.pill{background:rgba(212,165,165,.15);border:1px solid rgba(212,165,165,.4);color:var(--text-mid);font-size:13px;padding:6px 14px;border-radius:20px}
.btn-start{background:var(--rose);color:#fff;border:none;padding:16px 48px;border-radius:48px;font-size:17px;font-family:inherit;cursor:pointer;transition:transform .15s,background .15s;box-shadow:0 6px 24px rgba(212,165,165,.4)}
.btn-start:hover{background:var(--rose-dark);transform:translateY(-2px)}
.btn-start:active{transform:scale(.97)}
.home-note{margin-top:20px;font-size:13px;color:var(--text-light)}

/* QUIZ */
#quiz{background:var(--cream)}
.quiz-top{padding:20px 24px 12px;position:sticky;top:0;background:var(--cream);z-index:10;border-bottom:1px solid rgba(232,217,198,.6)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--text-light)}
.progress-track{width:100%;height:4px;background:var(--beige);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--rose);border-radius:4px;transition:width .4s ease}
.quiz-body{flex:1;padding:24px 24px 100px;max-width:600px;margin:0 auto;width:100%}
.question-num{font-size:13px;color:var(--text-light);margin-bottom:8px;letter-spacing:.5px}
.question-text{font-family:'Noto Serif SC',"STSong","SimSun",serif;font-size:clamp(18px,4.5vw,24px);color:var(--text-dark);line-height:1.5;margin-bottom:28px;min-height:60px}
.options{display:flex;flex-direction:column;gap:12px}
.option-btn{background:var(--card-bg);border:1.5px solid rgba(212,165,165,.25);border-radius:16px;padding:16px 20px;font-size:15px;color:var(--text-dark);font-family:inherit;cursor:pointer;text-align:left;transition:all .18s;min-height:56px}
@media(hover:hover){.option-btn:hover{border-color:var(--rose);background:rgba(212,165,165,.12);transform:translateY(-1px)}}
.option-btn.selected{border-color:var(--rose);background:rgba(212,165,165,.18);box-shadow:0 0 0 3px rgba(212,165,165,.12)}
.option-btn:active{transform:scale(.98)}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;position:fixed;bottom:0;left:0;right:0;padding:14px 24px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:var(--cream);border-top:1px solid var(--beige)}
.btn-prev{background:none;border:1.5px solid var(--beige);border-radius:40px;padding:10px 22px;font-size:14px;color:var(--text-mid);cursor:pointer;font-family:inherit;transition:all .15s}
.btn-prev:hover{border-color:var(--rose);color:var(--rose)}
.btn-prev:disabled{opacity:.3;cursor:default;pointer-events:none}

/* CONFIRM */
#confirm{background:var(--cream);padding:24px 24px 120px}
.confirm-title{font-family:'Noto Serif SC',"STSong",serif;font-size:20px;color:var(--text-dark);margin-bottom:6px;margin-top:8px}
.confirm-sub{font-size:14px;color:var(--text-light);margin-bottom:24px}
.confirm-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.confirm-item{display:flex;justify-content:space-between;align-items:center;background:var(--card-bg);border:1px solid var(--beige);border-radius:12px;padding:12px 16px;font-size:14px}
.confirm-item.missing-item{border-color:rgba(192,83,58,.4)}
.confirm-item-q{color:var(--text-light);flex:1;margin-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.confirm-item-a{color:var(--text-dark);font-weight:500;flex:1.2;text-align:center}
.confirm-item-edit{color:var(--rose);font-size:13px;cursor:pointer;flex-shrink:0;padding:2px 8px;border-radius:8px;transition:background .15s}
.confirm-item-edit:hover{background:rgba(212,165,165,.15)}
.confirm-footer{position:fixed;bottom:0;left:0;right:0;padding:14px 24px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:var(--cream);border-top:1px solid var(--beige)}
.btn-confirm{width:100%;background:var(--rose);color:#fff;border:none;border-radius:48px;padding:16px;font-size:16px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-confirm:hover{background:var(--rose-dark)}
.confirm-missing-tip{font-size:13px;color:#c0533a;text-align:center;margin-top:8px;display:none}

/* LOADING */
#loading{align-items:center;justify-content:center;background:var(--cream)}
.loading-spin{width:56px;height:56px;border:3px solid var(--beige);border-top-color:var(--rose);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--text-dark)}
.loading-sub{font-size:13px;color:var(--text-light);margin-top:6px;text-align:center}

/* RESULT */
#result{background:var(--cream);padding-bottom:60px}
.result-header{position:relative;width:100%;height:300px;overflow:hidden;display:flex;align-items:flex-end;padding:24px}
.result-header-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,rgba(0,0,0,.05) 60%,transparent 100%)}
.result-header-content{position:relative;z-index:1}
.result-label{font-size:13px;color:rgba(255,255,255,.85);margin-bottom:4px}
.result-city-name{font-family:'Ma Shan Zheng',"STKaiti",serif;font-size:clamp(44px,12vw,64px);color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.3);line-height:1.1}
.result-tag-label{display:inline-block;background:rgba(255,255,255,.22);color:#fff;font-size:13px;padding:4px 12px;border-radius:20px;margin-top:8px;border:1px solid rgba(255,255,255,.3)}
.result-body{padding:0 20px;max-width:600px;margin:0 auto}
.confidence-warning{margin:16px 0;background:rgba(230,184,162,.2);border:1px solid rgba(230,184,162,.5);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text-mid);display:none}
.result-section{margin-top:24px}
.result-section-title{font-size:12px;color:var(--text-light);letter-spacing:1.5px;margin-bottom:12px}
.result-analysis{font-family:'Noto Serif SC',"STSong",serif;font-size:15px;line-height:1.9;color:var(--text-dark);background:var(--card-bg);border-radius:16px;padding:20px;border:1px solid var(--beige)}
.conflict-box{background:rgba(212,165,165,.1);border:1px solid rgba(212,165,165,.3);border-radius:16px;padding:20px;margin-top:16px;font-size:14px;line-height:1.8;color:var(--text-dark);display:none}
.score-bars{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.score-row{display:flex;align-items:center;gap:10px}
.score-dim{font-size:13px;color:var(--text-mid);width:66px;flex-shrink:0}
.score-track{flex:1;height:6px;background:var(--beige);border-radius:4px;overflow:hidden}
.score-bar{height:100%;background:var(--rose);border-radius:4px;transition:width 1s ease}
.score-val{font-size:12px;color:var(--text-light);width:34px;flex-shrink:0;text-align:right}
.itinerary{display:flex;flex-direction:column;gap:10px}
.day-item{display:flex;gap:14px;align-items:flex-start}
.day-dot{width:32px;height:32px;border-radius:50%;background:rgba(212,165,165,.15);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--rose);font-weight:500;flex-shrink:0}
.day-text{font-size:14px;color:var(--text-dark);line-height:1.6;padding-top:6px}
.food-card{background:var(--card-bg);border:1px solid var(--beige);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px}
.food-icon{font-size:32px}
.food-name{font-size:16px;font-weight:500;color:var(--text-dark)}
.food-desc{font-size:13px;color:var(--text-light);margin-top:2px}
.alt-cities{display:flex;gap:10px}
.alt-city-card{flex:1;background:var(--card-bg);border:1px solid var(--beige);border-radius:14px;padding:14px;text-align:center}
.alt-city-icon{font-size:26px;margin-bottom:6px}
.alt-city-name{font-size:14px;font-weight:500;color:var(--text-dark)}
.alt-city-pct{font-size:13px;color:var(--rose);margin-top:2px}
.share-area{margin:32px 0 16px;display:flex;flex-direction:column;gap:12px}
.btn-share{width:100%;background:var(--rose);color:#fff;border:none;border-radius:48px;padding:16px;font-size:15px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-share:hover{background:var(--rose-dark)}
.btn-retry{width:100%;background:none;border:1.5px solid var(--beige);border-radius:48px;padding:14px;font-size:15px;color:var(--text-mid);font-family:inherit;cursor:pointer;transition:all .15s}
.btn-retry:hover{border-color:var(--rose);color:var(--rose)}
.fix-entry{text-align:center;font-size:13px;color:var(--text-light);margin-top:8px;cursor:pointer}
.fix-entry span{color:var(--rose);text-decoration:underline}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text-dark);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:600px){.confirm-list{display:grid;grid-template-columns:repeat(2,1fr)}.result-header{height:360px}}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-deco"><div class="deco-circle a"></div><div class="deco-circle b"></div><div class="deco-circle c"></div></div>
  <div class="home-icon">🧭</div>
  <div class="home-tag">心理旅行测评</div>
  <h1 class="home-title">测测你最近<br>最适合去哪座城市</h1>
  <p class="home-sub">20道题，读懂你藏在选择里的旅行灵魂，为你匹配一座专属城市。</p>
  <div class="home-pills">
    <span class="pill">🌊 治愈系</span><span class="pill">🍜 美食控</span>
    <span class="pill">🏯 文化控</span><span class="pill">🌲 自然派</span><span class="pill">☕ 慢生活</span>
  </div>
  <button class="btn-start" onclick="startQuiz()">开始测试</button>
  <p class="home-note">约3分钟 · 20个城市备选</p>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-top">
    <div class="progress-header"><span id="progress-text">第 1 / 20 题</span><span id="progress-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-body">
    <div class="question-num" id="q-num">Q1</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
  </div>
  <div class="quiz-nav">
    <button class="btn-prev" id="btn-prev" onclick="prevQuestion()" disabled>← 上一题</button>
    <span style="font-size:13px;color:var(--text-light)" id="q-hint"></span>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm" class="screen">
  <div style="max-width:600px;margin:0 auto;width:100%">
    <div style="font-size:28px;margin-bottom:8px">📋</div>
    <h2 class="confirm-title">确认你的答案</h2>
    <p class="confirm-sub">认真看一遍，手滑了可以修改哦</p>
    <div class="confirm-list" id="confirm-list"></div>
  </div>
  <div class="confirm-footer">
    <button class="btn-confirm" onclick="tryGenerate()">🔮 确认无误，生成结果</button>
    <div class="confirm-missing-tip" id="missing-tip">⚠️ 还有题目未作答，请点击对应题目的「修改」补充</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen">
  <div style="text-align:center">
    <div class="loading-spin"></div>
    <div class="loading-text" id="loading-text">正在解读你的灵魂…</div>
    <div class="loading-sub">匹配全国20座城市中</div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-header" id="result-header">
    <div class="result-header-overlay"></div>
    <div class="result-header-content">
      <div class="result-label" id="result-month-label"></div>
      <div class="result-city-name" id="result-city-name"></div>
      <div class="result-tag-label" id="result-personality"></div>
    </div>
  </div>
  <div class="result-body">
    <div class="confidence-warning" id="confidence-warning">⚠️ 你的答案有些矛盾，结果仅供参考——也可以点击下方重新测试</div>
    <div id="alt-cities-section" class="result-section" style="display:none">
      <div class="result-section-title">你可能也适合</div>
      <div class="alt-cities" id="alt-cities"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">你的旅行灵魂</div>
      <div class="result-analysis" id="result-analysis"></div>
    </div>
    <div class="conflict-box" id="conflict-box">
      <div style="font-size:20px;margin-bottom:8px">🌟</div>
      <div id="conflict-text"></div>
    </div>
    <div class="result-section" id="score-section">
      <div class="result-section-title">你的维度画像</div>
      <div class="score-bars" id="score-bars"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">3天行程建议</div>
      <div class="itinerary" id="itinerary"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">必吃一道菜</div>
      <div class="food-card" id="food-card"></div>
    </div>
    <div class="share-area">
      <button class="btn-share" onclick="shareResult()">📤 @那个最该陪你去的人</button>
      <button class="btn-retry" onclick="restartQuiz()">🔄 重新测试一次</button>
    </div>
    <div class="fix-entry" onclick="goToConfirm()">🤔 觉得不准？<span>回去修正关键题</span></div>
    <div style="height:40px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const questions=[
  {text:"如果有一天你变成一种天气，你希望是？",opts:["🌧️ 毛毛雨，湿润又朦胧","☀️ 晴朗无云，阳光充足","🌤️ 多云凉爽，舒适刚好","⛈️ 狂风暴雨，酣畅淋漓","🌫️ 薄雾弥漫，若隐若现"]},
  {text:"你更想被哪种声音叫醒？",opts:["🌊 海浪声","🐦 鸟叫声","☕ 咖啡机磨豆声","🔇 什么声音都没有","🌧️ 窗外的雨声"]},
  {text:"旅行中迷路了，你的第一反应是？",opts:["📱 掏出手机开导航","🙋 找当地人问路","🚶 随便逛，反正总能回去","🧍 站在原地等同伴","☕ 先找个咖啡馆坐下来研究"]},
  {text:"你愿意在哪幅画里待一整天？",opts:["🌸 莫奈《睡莲》","🌌 梵高《星空》","🏘️ 张择端《清明上河图》","🔲 蒙德里安格子画","🏔️ 霍珀《海边的房间》"]},
  {text:"早餐单选，你选哪个？",opts:["🍜 当地特色粥粉","🥐 西式面包咖啡","🥗 水果酸奶碗","🍳 丰盛自助餐","🥢 随便找个路边摊解决"]},
  {text:"理想的住宿窗外风景是？",opts:["🌊 大海","🏘️ 古城小巷","⛰️ 山峦云雾","🏙️ 繁华商业街","🌾 稻田与远山"]},
  {text:"你会带哪种旅行纪念品回家？",opts:["🧲 冰箱贴","🪨 一块当地的石头/树叶","🏺 手工艺品","📷 什么都不带，只有照片","🫙 一罐当地特产吃食"]},
  {text:"用三个词形容你最近的周末，最像哪个？",opts:["😴 躺平、外卖、刷剧","🎉 聚会、探店、暴走","📚 看书、咖啡、发呆","😤 加班、带娃、累","🏃 运动、爬山、户外"]},
  {text:"哪种颜色组合最让你放松？",opts:["💙 蓝+白","🌿 绿+棕","🧡 橙+黄","🖤 黑+灰","🌸 粉+米白"]},
  {text:"你喜欢怎么逛一座新城？",opts:["🚇 地铁穿梭","🚌 公交漫游","🚶 暴走探索","🚕 打车直达","🚲 骑共享单车"]},
  {text:"如果给你一个假期时长，你选？",opts:["⚡ 3天小短途","✈️ 5-7天刚刚好","🏝️ 10-15天深度游","🌍 一个月以上"]},
  {text:"你手机相册里最多的是？",opts:["🌅 风景/天空","🍱 美食特写","🤳 自拍/朋友合影","🏛️ 建筑/街景","🐾 动植物/小动物"]},
  {text:"你最想在旅途中偶遇什么？",opts:["🏪 藏在巷子里的宝藏小店","🎊 一场当地传统节日","🤝 一个聊得来的陌生人","🏔️ 一片只有自己的美景","🍜 排队排到怀疑人生的苍蝇馆子"]},
  {text:"你觉得自己更像哪种动物？",opts:["🐱 猫（独立、随性）","🐶 狗（热情、好奇）","🐦 鸟（自由、爱飞）","🐟 鱼（安静、游荡）","🐻 熊（能吃能睡、偶尔出来玩）"]},

// ── QUIZ ──
function renderQuestion(){
  const q=questions[currentQ];
  document.getElementById('q-num').textContent=`Q${currentQ+1}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('progress-text').textContent=`第 ${currentQ+1} / 20 题`;
  const pct=Math.round(currentQ/15*100);
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('btn-prev').disabled=currentQ===0;
  const opts=document.getElementById('q-options');
  opts.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn'+(answers[currentQ]===i?' selected':'');
    btn.textContent=opt;
    btn.onclick=()=>selectOption(i);
    opts.appendChild(btn);
  });
}
function selectOption(i){
  timePerQ[currentQ]=(Date.now()-questionStartTime)/1000;
  questionStartTime=Date.now();
  answers[currentQ]=i;
  document.querySelectorAll('.option-btn').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  setTimeout(()=>{if(currentQ<19){currentQ++;renderQuestion();}else showConfirm();},300);
}
function prevQuestion(){if(currentQ>0){returnCount++;currentQ--;renderQuestion();}}

// ── CONFIRM ── FIX: record enter time when page opens
function showConfirm(){
  confirmEnterTime=Date.now();
  const list=document.getElementById('confirm-list');
  list.innerHTML='';
  questions.forEach((q,i)=>{
    const ans=answers[i];
    const item=document.createElement('div');
    item.className='confirm-item'+(ans===null?' missing-item':'');
    item.innerHTML=`<span class="confirm-item-q">${i+1}. ${q.text.slice(0,12)}…</span>
      <span class="confirm-item-a">${ans!==null?q.opts[ans].replace(/^[^\s]+\s/,''):'<span style="color:#c0533a;font-weight:500">未选 ⚠️</span>'}</span>
      <span class="confirm-item-edit" onclick="editQuestion(${i})">修改</span>`;
    list.appendChild(item);
  });
  document.getElementById('missing-tip').style.display='none';
  showScreen('confirm');
}
function editQuestion(idx){currentQ=idx;questionStartTime=Date.now();renderQuestion();showScreen('quiz')}

// ── ALGORITHM ──
function calcPenalizedScores(ans,extreme){
  const s={natural:0,social:0,plan:0,slow:0,culture:0,heal:0,warm:0,taste:0};
  ans.forEach((a,qi)=>{
    if(a===null)return;
    const m=dimMap[qi][a];
    let pen=1.0;
    extreme.forEach(c=>{if(c.questions.includes(qi))pen=Math.min(pen,c.penalty);});
    for(const[d,v]of Object.entries(m))s[d]=(s[d]||0)+v*pen;
  });
  return s;
}

// FIX: proper normalization — raw scores → 1–5 scale matching city scores
function normalize(raw){
  const n={};
  for(const d of Object.keys(dimMax)){
    const clamped=Math.max(0,Math.min(dimMax[d],raw[d]||0));
    n[d]=1+(clamped/dimMax[d])*4;
  }
  return n;
}

function detectConflicts(ans){
  const extreme=[],real=[];
  if(ans[9]===0&&ans[10]===3)extreme.push({questions:[9,10],penalty:0.5});
  if(ans[2]===1&&ans[13]===0)extreme.push({questions:[2,13],penalty:0.6});
  if(ans[0]===3&&ans[7]===0)extreme.push({questions:[0,7],penalty:0.6});
  if(ans[2]===1&&ans[13]===3)real.push('ambivert');
  if((ans[5]===0||ans[5]===2)&&ans[11]===1)real.push('natureAndFood');
  return{extreme,real};
}

  const filled=ans.filter(a=>a!==null);
  if(filled.length>=5&&filled.every(a=>a===filled[0]))c-=30;
  if(returnCount>=1)c+=10;if(returnCount>=3)c+=5;
  // FIX: use time since confirm page opened
  if((Date.now()-confirmEnterTime)/1000<2)c-=10;
  return Math.max(0,Math.min(100,c));
}

// 城市硬性过滤条件（防止某些城市被不合适的用户匹配）
const cityFilters={
  '哈尔滨': u=>u.warm<1.8,   // 只推给偏好凉爽/寒冷气候的人
};

function getFinalWeights(){
  // 基础权重 × 季节修正
  const base=dimWeights;
  const m=new Date().getMonth()+1;
  let seasonal={};
  if(m>=6&&m<=8)     seasonal={warm:1.4};          // 夏：暖度权重提升
  else if(m>=11||m<=2) seasonal={warm:1.6,heal:1.2}; // 冬：暖度最重要
  else                 seasonal={natural:1.1,culture:1.1}; // 春秋：自然文化加成
  const dims=['natural','social','plan','slow','culture','heal','warm','taste'];
  const w={};
  for(const d of dims) w[d]=(base[d]||1)*(seasonal[d]||1);
  return w;
}

function euclid(normScores,city,w){
  const dims=['natural','social','plan','slow','culture','heal','warm','taste'];
  let s=0;for(const d of dims){const diff=(normScores[d]||1)-city[d];s+=(w[d]||1)*diff*diff;}
  return Math.sqrt(s);
}

function matchCities(normScores){
  const w=getFinalWeights();
  // 先过滤不适合该用户的城市
  const pool=cities.filter(c=>!cityFilters[c.name]||cityFilters[c.name](normScores));
  const scored=pool.map(c=>({city:c,dist:euclid(normScores,c,w)}));
  scored.sort((a,b)=>a.dist-b.dist);
  // 当top1和top2距离非常接近时，小概率随机交换（增加结果多样性）
  if(scored.length>1&&scored[1].dist-scored[0].dist<0.8&&Math.random()<0.15)
    [scored[0],scored[1]]=[scored[1],scored[0]];
  return scored;
}

// FIX: softmax probabilities that sum to ~100%
function softmaxTop3(ranked){
  const top=ranked.slice(0,3);
  const logits=top.map(r=>-r.dist);
  const mx=Math.max(...logits);
  const exps=logits.map(l=>Math.exp(l-mx));
  const total=exps.reduce((a,b)=>a+b,0);
  return top.map((r,i)=>({city:r.city,pct:Math.round(exps[i]/total*100)}));
}

function getPersonality(norm){
  const s={};for(const[k,v]of Object.entries(norm))s[k]=(v-1)*2.5;
  for(const rule of personalityRules){
    let ok=true;
    for(const[d,[lo,hi]]of Object.entries(rule.conds)){if((s[d]||0)<lo||(s[d]||0)>hi){ok=false;break;}}
    if(ok)return rule.label;
  }
  return"🌏 旅行探索者";
}

// ── GENERATE ──
function generateResult(){
  showScreen('loading');
  const msgs=["正在解读你的灵魂…","为你匹配最佳城市…","计算旅行维度中…","你的专属城市即将揭晓…"];
  let li=0;const el=document.getElementById('loading-text');
  const t=setInterval(()=>el.textContent=msgs[li++%msgs.length],600);
  setTimeout(()=>{
    clearInterval(t);
    const{extreme,real}=detectConflicts(answers);
    const raw=calcPenalizedScores(answers,extreme);
    const norm=normalize(raw);
    const conf=calcConfidence(answers,extreme);
    const ranked=matchCities(norm);
    const topCity=ranked[0].city;
    const personality=getPersonality(norm);
    renderResult(topCity,raw,norm,conf,real,ranked);
    analytics.trackComplete(topCity,conf,real,personality); // 埋点：结果生成
    showScreen('result');
  },2400);
}

// ── RENDER RESULT ──
function renderResult(city,raw,norm,conf,real,ranked){
  const month=new Date().getMonth();
  const hdr=document.getElementById('result-header');
  // Set gradient as immediate fallback while photo loads
  hdr.querySelectorAll('.city-bg-img,svg').forEach(el=>el.remove());
  hdr.style.background=`linear-gradient(160deg,${city.c1}dd,${city.c2}ee)`;
  // Async load Unsplash photo — updates header when ready
  fetchCityPhoto(city).then(url=>setHeaderPhoto(url,city));

  document.getElementById('result-city-name').textContent=city.name;
  document.getElementById('result-month-label').textContent=`🔮 你的${monthNames[month]}旅行目的地`;
  document.getElementById('result-personality').textContent=getPersonality(norm);

  const warn=document.getElementById('confidence-warning');
  warn.style.display=conf<60?'block':'none';

  // alt cities
  const altSec=document.getElementById('alt-cities-section');
  if(conf<60){
    const probs=softmaxTop3(ranked);
    document.getElementById('alt-cities').innerHTML=probs.map(p=>`<div class="alt-city-card"><div class="alt-city-icon">${p.city.icon}</div><div class="alt-city-name">${p.city.name}</div><div class="alt-city-pct">${p.pct}%</div></div>`).join('');
    altSec.style.display='block';
  }else altSec.style.display='none';

  // analysis
  const aIdx=Math.floor(Math.random()*city.analyses.length);
  document.getElementById('result-analysis').innerHTML=city.analyses[aIdx].replace(/\n/g,'<br>');

  // conflict
  const cb=document.getElementById('conflict-box');
  if(real.length>0){
    cb.style.display='block';
    document.getElementById('conflict-text').innerHTML='你是一个<strong>多面体</strong>。<br>'+real.map(k=>conflictTexts[k]||'').join('<br>')+`<br><br>所以我们为你推荐了 <strong>${city.name}</strong>——一座允许你同时拥有多种体验的城市。`;
  }else cb.style.display='none';

  // scores
  const ss=document.getElementById('score-section');
  if(conf>=60){
    ss.style.display='block';
    const dims=[['natural','亲近自然'],['social','社交能量'],['slow','慢节奏'],['culture','文化兴趣'],['heal','治愈需求'],['warm','温暖偏好'],['taste','美食驱动']];
    document.getElementById('score-bars').innerHTML=dims.map(([d,label])=>{
      const pct=Math.round(Math.max(0,Math.min(100,((raw[d]||0)/dimMax[d])*100)));
      return`<div class="score-row"><span class="score-dim">${label}</span><div class="score-track"><div class="score-bar" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
    }).join('');
  }else ss.style.display='none';

  document.getElementById('itinerary').innerHTML=city.itinerary.map((d,i)=>`<div class="day-item"><div class="day-dot">D${i+1}</div><div class="day-text">${d}</div></div>`).join('');
  document.getElementById('food-card').innerHTML=`<div class="food-icon">${city.foodIcon}</div><div><div class="food-name">${city.food}</div><div class="food-desc">${city.foodDesc}</div></div>`;
}

async function fetchCityPhoto(city){
  if(photoCache[city.name]) return photoCache[city.name];

  // 【第一层】本地图片优先
  const local=cityPhotos[city.name];
  if(local){ photoCache[city.name]=local; return local; }

  // 【第二层】Unsplash API 兜底
  const query=cityQueries[city.name]||city.name+' China travel';
  try{
    const url=`https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&per_page=5&orientation=landscape&client_id=${UNSPLASH_KEY}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('api error');
    const data=await res.json();
    if(data.results&&data.results.length>0){
      const best=data.results.reduce((a,b)=>b.likes>a.likes?b:a);
      fetch(best.links.download_location+'&client_id='+UNSPLASH_KEY).catch(()=>{});
      photoCache[city.name]=best.urls.regular;
      return best.urls.regular;
    }
  }catch(e){}

  // 【第三层】返回 null → 调用方降级为渐变色
  return null;
}

function setHeaderPhoto(url,city){
  const hdr=document.getElementById('result-header');

  hdr.querySelectorAll('.city-bg-img').forEach(el=>el.remove());
  if(url){

    img.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center;';

  } else {
    // graceful fallback: solid gradient
    hdr.style.background=`linear-gradient(160deg,${city.c1}dd,${city.c2}dd)`;
  }
}

// ── ANALYTICS — Supabase 埋点系统 ──
// 追踪：完成率 / 城市分布 / 题目选项分布 / 矛盾&置信度 / 分享率
// ══════════════════════════════════════════════════════
const analytics = (() => {
  const URL  = 'https://udjczeowhogqlqcevvua.supabase.co';
  const KEY  = 'sb_publishable_8tlKgZBd6VmAAIgnBksmfA_jOyXakoi';

  let _sessionId  = null;   // 写入 quiz_sessions 后返回的 uuid
  let _completed  = false;  // 是否已完成结果页
  let _quizActive = false;  // 是否正在答题中

  // ── 底层请求 ──
  async function _post(path, body){
    try{
      const res = await fetch(`${URL}/rest/v1/${path}`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`,
          'Prefer':        'return=representation'
        },
        body: JSON.stringify(body)
      });
      if(!res.ok) return null;
      return await res.json();
    } catch(e){ return null; }
  }

  async function _patch(path, body){
    try{
      await fetch(`${URL}/rest/v1/${path}`, {
        method: 'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`,
          'Prefer':        'return=minimal'
        },
        body: JSON.stringify(body)
      });
    } catch(e){}
  }

  async function _rpc(fn, body){
    try{
      await fetch(`${URL}/rest/v1/rpc/${fn}`, {
        method: 'POST',
        headers: {
          'Content-Type':  'application/json',
          'apikey':        KEY,
          'Authorization': `Bearer ${KEY}`
        },
        body: JSON.stringify(body)
      });
    } catch(e){}
  }

  // ── 1. 用户开始答题 ──
  function trackStart(){
    _sessionId = null;
    _completed = false;
    _quizActive = true;
  }

  // ── 2. 中途退出埋点（visibilitychange 触发）──
  function _trackDropoff(){
    if(_completed || !_quizActive) return;
    // sendBeacon 在页面关闭时仍可发出
    const body = JSON.stringify({ dropped_at_q: currentQ + 1 });
    navigator.sendBeacon(
      `${URL}/rest/v1/quiz_dropoffs`,
      new Blob([body], { type: 'application/json' })
    );
  }

  // ── 3. 完成测试，写入完整 session ──
  async function trackComplete(city, confidence, conflicts, personality){
    _completed  = true;
    _quizActive = false;

    const avgTime = timePerQ.length
      ? +(timePerQ.reduce((a,b)=>a+b,0)/timePerQ.length).toFixed(2)
      : null;

    const rows = await _post('quiz_sessions', {
      result_city:    city.name,
      personality_tag: personality,
      confidence:     Math.round(confidence),
      has_conflict:   conflicts.length > 0,
      conflict_types: conflicts,
      answers:        answers,          // int[15]
      avg_time_per_q: avgTime,
      return_count:   returnCount,
      shared:         false,
      user_agent:     navigator.userAgent.slice(0, 200)
    });

    if(rows && rows[0]) _sessionId = rows[0].id;

    // 原子自增 question_stats & city_stats
    _rpc('increment_stats', {
      answers_arr: answers,
      city_name:   city.name
    });
  }

  // ── 4. 点击分享 ──
  async function trackShare(){
    if(!_sessionId) return;
    _patch(`quiz_sessions?id=eq.${_sessionId}`, { shared: true });
  }

  // 页面隐藏时触发退出埋点
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'hidden') _trackDropoff();
  });

  return { trackStart, trackComplete, trackShare };
})();
